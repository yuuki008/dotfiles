# ~/.config/starship.toml

add_newline = true

# ----------------------------------------------------
# format
# ----------------------------------------------------
format = """
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$time\
\n$character\
"""

# ----------------------------------------------------
# left module
# ----------------------------------------------------
[directory]
truncation_length = 6
truncation_symbol = ' '
truncate_to_repo = false
home_symbol = '~'
read_only = ' 󰌾 '
format = """
[](fg:#80EBDF)\
[$path]($style)\
[$read_only]($read_only_style)\
[](fg:#80EBDF)\
"""
style = 'bold fg:#313244 bg:#80EBDF'
read_only_style = 'bold fg:#313244 bg:#80EBDF'

[fill]
symbol = '─'

[git_branch]
symbol = ""
style = "fg:#769ff0 bg:#1d2230"
format = """
[](fg:#1d2230)\
[$symbol $branch]($style)\
"""

[git_status]
style = "fg:#769ff0 bg:#1d2230"
format = """
[$all_status$ahead_behind]($style)\
[](fg:#1d2230)\
"""

# ----------------------------------------------------
# right module
# ----------------------------------------------------
[cmd_duration]
min_time = 1
style = 'fg:#e0af68'
format = "[ $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[  $time](fg:#a0a9cb)]($style)'

# ----------------------------------------------------
# prompt module
# ----------------------------------------------------
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = '[V](bold green) '

# ----------------------------------------------------
# disabled modules
# ----------------------------------------------------
[status]
disabled = true

[aws]
disabled = true

[battery]
disabled = true

[gcloud]
disabled = true

[hostname]
disabled = true

[java]
disabled = true

[nodejs]
disabled = true

[package]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[terraform]
disabled = true

[docker_context]
disabled = true

[lua]
disabled = true
